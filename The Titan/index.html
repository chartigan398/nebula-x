<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#030308" />
  <title>The Titan — Organic Particle Prototype</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #030308; color: #9cf; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; left: 12px; bottom: 12px; font-size: 11px; opacity: 0.65;
      pointer-events: none; max-width: min(420px, 90vw); line-height: 1.45;
    }
    #err {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center; color: #f88; font-size: 14px;
    }
    #audio-ui {
      position: fixed; top: 12px; left: 12px; z-index: 5; font-size: 11px;
      display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
      pointer-events: auto;
    }
    #audio-ui label { cursor: pointer; color: #7ec; text-decoration: underline; }
    #audio-ui input[type="file"] { display: none; }
    #audio-ui .hint { opacity: 0.5; font-size: 10px; max-width: 280px; line-height: 1.35; }
    #audio-ui .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #audio-ui button {
      padding: 4px 10px; font-size: 10px; cursor: pointer;
      background: #1a1a24; color: #9cf; border: 1px solid #345; border-radius: 4px;
    }
    #audio-ui button:hover { background: #252532; }
    #audio-ui input[type="range"] { width: 120px; vertical-align: middle; }
    #map-panel {
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #222;
      font-size: 10px; color: #8ab;
    }
    #map-panel label { display: block; margin-top: 4px; opacity: 0.85; }
  </style>
</head>
<body>
  <div id="audio-ui">
    <label for="titan-audio-file">Load audio file</label>
    <input type="file" id="titan-audio-file" accept="audio/*" />
    <div class="row">
      <button type="button" id="btn-audio-play" disabled>Play</button>
      <span style="opacity:0.6;font-size:10px;">Vol</span>
      <input type="range" id="audio-vol" min="0" max="1" step="0.02" value="0.85" />
    </div>
    <div class="row" style="margin-top:4px;align-items:center;">
      <span style="opacity:0.6;font-size:10px;width:36px;">Seek</span>
      <input type="range" id="audio-seek" min="0" max="1" step="0.1" value="0" disabled style="flex:1;min-width:140px;max-width:220px;" />
    </div>
    <span id="audio-status" class="hint">No file · motion = ambient only</span>
    <div id="map-panel">
      <strong style="opacity:0.7;">Audio → visual</strong>
      <label>Bass gain <input type="range" id="map-bass" min="0" max="2.5" step="0.05" value="1" /></label>
      <label>Mid gain <input type="range" id="map-mid" min="0" max="2.5" step="0.05" value="1" /></label>
      <label>High gain <input type="range" id="map-high" min="0" max="2.5" step="0.05" value="1" /></label>
      <label>Envelope speed <input type="range" id="map-smooth" min="2" max="24" step="0.5" value="8" /></label>
      <div class="hint" style="margin-top:6px;">URL: <code>?bass=1&amp;mid=1&amp;high=1&amp;smooth=8&amp;lite=1&amp;sim=gpu&amp;bloom=0&amp;act=180</code></div>
    </div>
  </div>
  <div id="hud">
    <strong>The Titan</strong> · Phase A visual prototype · organic shader flow<br />
    <span id="status">Initializing…</span>
  </div>
  <div id="err" style="display: none;"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
