<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula X - Cinematic Ambient Edition</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: crosshair; }
        
        #ui { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            color: white; 
            text-align: center;
            pointer-events: none; 
            text-shadow: 0 0 40px rgba(0,255,255,0.7);
            transition: opacity 3s ease;
            z-index: 10;
        }

        #ui h1 { font-size: 3.5rem; font-weight: 100; letter-spacing: 20px; margin: 0; text-transform: uppercase; }
        #ui p { font-size: 0.9rem; letter-spacing: 8px; opacity: 0.4; margin-top: 20px; }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.15);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #clock {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 11px;
            z-index: 10;
            transition: opacity 0.5s ease;
            background: rgba(0,0,0,0.4);
            padding: 12px 16px;
            border-radius: 8px;
            min-width: 180px;
        }
        #control-panel label { display: block; margin-top: 8px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        #control-panel input[type="range"] { width: 100%; margin: 0; }
        #control-panel select { width: 100%; margin-top: 4px; padding: 4px; background: #111; color: #fff; border: 1px solid #333; border-radius: 4px; }
        #control-panel .audio-row { margin-top: 10px; }
        #control-panel button { margin-top: 6px; padding: 6px 10px; background: #222; color: #0ff; border: 1px solid #0ff; border-radius: 4px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        #control-panel button:hover { background: #0ff; color: #000; }
        #control-panel button.active { background: #0ff; color: #000; }
        #control-panel input[type="file"] { font-size: 10px; margin-top: 4px; }

        canvas { display: block; filter: contrast(110%) brightness(110%); }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Nebula X</h1>
        <p>Cinematic Deep Space Journey</p>
    </div>

    <div id="controls">
        Press F for Fullscreen • Mouse to Influence • Click to Toggle UI • C = Clock • A = Audio
    </div>

    <div id="clock" style="display: none;"></div>

    <div id="control-panel">
        <strong>Preset</strong>
        <select id="preset">
            <option value="calm">Calm</option>
            <option value="intense">Intense</option>
            <option value="slow">Slow camera</option>
        </select>
        <label>Color speed</label>
        <input type="range" id="colorSpeed" min="0.5" max="3" step="0.1" value="1">
        <label>Camera speed</label>
        <input type="range" id="cameraSpeed" min="0.3" max="2" step="0.1" value="1">
        <label>Particle speed</label>
        <input type="range" id="particleSpeed" min="0.5" max="2" step="0.1" value="1">
        <div class="audio-row">
            <strong>Audio</strong>
            <br><button type="button" id="btnMic">Mic</button>
            <button type="button" id="btnFile">File</button>
            <br><input type="file" id="audioFile" accept="audio/*" style="display:none">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const STORAGE_UI = 'nebula-x-ui-visible';
        const STORAGE_CLOCK = 'nebula-x-clock-visible';

        let scene, camera, renderer, points, geometry;
        let positions, initialPositions, colors, sizes, phases;
        const particleCount = 45000; 
        
        let time = 0;
        let colorOffset = 0;
        let uiVisible = true;
        let clockVisible = false;
        let mouse = { x: 0, y: 0 };
        let targetMouse = { x: 0, y: 0 };

        // Tunable params (Phase 3)
        let params = {
            colorSpeed: 1,
            cameraSpeed: 1,
            particleSpeed: 1
        };

        // Audio (Phase 2)
        let audioCtx = null;
        let analyser = null;
        let audioEnabled = false;
        let audioLevel = 0;
        let audioSmoothing = 0.15;
        let audioSource = null;

        const PRESETS = {
            calm:    { colorSpeed: 0.6, cameraSpeed: 0.5, particleSpeed: 0.6 },
            intense: { colorSpeed: 1.8, cameraSpeed: 1.5, particleSpeed: 1.4 },
            slow:    { colorSpeed: 0.5, cameraSpeed: 0.35, particleSpeed: 0.5 }
        };

        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.5)');
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            uiVisible = localStorage.getItem(STORAGE_UI) !== 'false';
            clockVisible = localStorage.getItem(STORAGE_CLOCK) === 'true';

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0007);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 4000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            initialPositions = new Float32Array(particleCount * 3);
            colors = new Float32Array(particleCount * 3);
            sizes = new Float32Array(particleCount);
            phases = new Float32Array(particleCount); 

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const isDisc = Math.random() > 0.3;
                let radius, theta, phi;

                if (isDisc) {
                    radius = 20 + Math.random() * 500;
                    theta = Math.random() * Math.PI * 2;
                    phi = (Math.PI / 2) + (Math.random() - 0.5) * 0.5; 
                } else {
                    radius = Math.random() * 800;
                    theta = Math.random() * Math.PI * 2;
                    phi = Math.acos((Math.random() * 2) - 1);
                }

                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);

                initialPositions[i3] = positions[i3];
                initialPositions[i3 + 1] = positions[i3 + 1];
                initialPositions[i3 + 2] = positions[i3 + 2];

                sizes[i] = Math.random() < 0.05 ? 4.0 + Math.random() * 4 : 0.5 + Math.random() * 2;
                phases[i] = Math.random() * Math.PI * 2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 2.2,
                map: createStarTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });
            points = new THREE.Points(geometry, material);
            scene.add(points);

            window.addEventListener('mousemove', (e) => {
                targetMouse.x = (e.clientX / window.innerWidth - 0.5) * 100;
                targetMouse.y = (e.clientY / window.innerHeight - 0.5) * 100;
            });

            window.addEventListener('mousedown', toggleUI);
            window.addEventListener('keydown', (e) => {
                if (e.key === 'f' || e.key === 'F') toggleFullscreen();
                if (e.key === 'c' || e.key === 'C') toggleClock();
                if (e.key === 'a' || e.key === 'A') toggleAudio();
            });

            window.addEventListener('resize', onWindowResize);

            document.getElementById('ui').style.opacity = uiVisible ? '1' : '0';
            document.getElementById('controls').style.opacity = uiVisible ? '1' : '0';
            document.getElementById('control-panel').style.opacity = uiVisible ? '1' : '0';
            document.getElementById('clock').style.display = clockVisible ? 'block' : 'none';

            document.getElementById('preset').addEventListener('change', applyPreset);
            document.getElementById('colorSpeed').addEventListener('input', (e) => { params.colorSpeed = +e.target.value; });
            document.getElementById('cameraSpeed').addEventListener('input', (e) => { params.cameraSpeed = +e.target.value; });
            document.getElementById('particleSpeed').addEventListener('input', (e) => { params.particleSpeed = +e.target.value; });
            document.getElementById('btnMic').addEventListener('click', enableMic);
            document.getElementById('btnFile').addEventListener('click', () => document.getElementById('audioFile').click());
            document.getElementById('audioFile').addEventListener('change', enableFile);

            animate();
            if (clockVisible) updateClock();
        }

        function toggleUI() {
            uiVisible = !uiVisible;
            localStorage.setItem(STORAGE_UI, String(uiVisible));
            document.getElementById('ui').style.opacity = uiVisible ? '1' : '0';
            document.getElementById('controls').style.opacity = uiVisible ? '1' : '0';
            document.getElementById('control-panel').style.opacity = uiVisible ? '1' : '0';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        function toggleClock() {
            clockVisible = !clockVisible;
            localStorage.setItem(STORAGE_CLOCK, String(clockVisible));
            const el = document.getElementById('clock');
            el.style.display = clockVisible ? 'block' : 'none';
            if (clockVisible) updateClock();
        }

        function updateClock() {
            const el = document.getElementById('clock');
            if (!el || el.style.display === 'none') return;
            const now = new Date();
            el.textContent = now.toISOString().substr(11, 12);
            setTimeout(updateClock, 100);
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('btnMic').classList.toggle('active', audioEnabled);
            if (!audioEnabled && audioCtx) {
                if (audioSource) try { audioSource.disconnect(); } catch (_) {}
                audioLevel = 0;
            }
        }

        function enableMic() {
            if (audioEnabled && analyser) { toggleAudio(); return; }
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = 0.8;
                }
                if (audioSource) try { audioSource.disconnect(); } catch (_) {}
                audioSource = audioCtx.createMediaStreamSource(stream);
                audioSource.connect(analyser);
                audioEnabled = true;
                document.getElementById('btnMic').classList.add('active');
            }).catch(() => {});
        }

        function enableFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const audio = new Audio(url);
            audio.crossOrigin = 'anonymous';
            audio.play().catch(() => {});

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;
            }
            if (audioSource) try { audioSource.disconnect(); } catch (_) {}
            audioSource = audioCtx.createMediaElementSource(audio);
            audioSource.connect(analyser);
            analyser.connect(audioCtx.destination);
            audioEnabled = true;
            document.getElementById('btnMic').classList.add('active');
        }

        function getAudioLevel() {
            if (!audioEnabled || !analyser) return 0;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            let sum = 0;
            for (let i = 0; i < data.length; i++) sum += data[i];
            const level = (sum / data.length) / 255;
            audioLevel += (level - audioLevel) * audioSmoothing;
            return audioLevel;
        }

        function applyPreset() {
            const name = document.getElementById('preset').value;
            const p = PRESETS[name];
            if (!p) return;
            params.colorSpeed = p.colorSpeed;
            params.cameraSpeed = p.cameraSpeed;
            params.particleSpeed = p.particleSpeed;
            document.getElementById('colorSpeed').value = p.colorSpeed;
            document.getElementById('cameraSpeed').value = p.cameraSpeed;
            document.getElementById('particleSpeed').value = p.particleSpeed;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = 0.0015 * params.particleSpeed;
            time += dt; 
            const level = getAudioLevel();
            // Slow drift; no integer wrap so colors don't snap/loop
            colorOffset += (0.00002 * params.colorSpeed) + (level * 0.005);

            mouse.x += (targetMouse.x - mouse.x) * 0.02;
            mouse.y += (targetMouse.y - mouse.y) * 0.02;

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;
            const sizeAttr = geometry.attributes.size;
            const colorTool = new THREE.Color();

            // Irrational multipliers so the camera path never visibly repeats
            const camSpeed = time * 0.2 * params.cameraSpeed * (1 + level * 0.5);
            const PI = Math.PI;
            const PHI = 1.618033988749895;
            camera.position.x = Math.sin(camSpeed) * 350 + mouse.x;
            camera.position.y = Math.cos(camSpeed * PI) * 250 - mouse.y;
            camera.position.z = Math.cos(camSpeed * PHI) * 400 + 400;
            camera.lookAt(mouse.x * 0.5, -mouse.y * 0.5, 0);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const slowWave = Math.sin(time * 0.2 * PI + initialPositions[i3] * 0.005);
                const fastWave = Math.sin(time * PHI + initialPositions[i3+1] * 0.02) * 2;
                
                posAttr.array[i3] = initialPositions[i3] + slowWave * 10 + fastWave;
                posAttr.array[i3+1] = initialPositions[i3+1] + slowWave * 5;
                
                const twinkle = Math.sin(time * 2 * PHI + phases[i]);
                sizeAttr.array[i] = sizes[i] * (0.8 + twinkle * 0.4);

                // Smooth color drift (sin so no snap when wrapping)
                const hue = ( (initialPositions[i3] / 1000) + 0.5 + 0.5 * Math.sin(colorOffset) + (slowWave * 0.1) + 1 ) % 1;
                colorTool.setHSL(hue, 0.8, 0.6);
                colAttr.array[i3] = colorTool.r;
                colAttr.array[i3+1] = colorTool.g;
                colAttr.array[i3+2] = colorTool.b;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            sizeAttr.needsUpdate = true;

            points.material.size = 2.2 * (1 + level * 0.4);

            points.rotation.y += 0.0003;
            points.rotation.z += 0.0001;

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
