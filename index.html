<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula X - Morphing Shapes Edition</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: crosshair; }
        
        #ui { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            color: white; 
            text-align: center;
            pointer-events: none; 
            text-shadow: 0 0 40px rgba(255,255,255,0.5);
            transition: opacity 3s ease;
            z-index: 10;
        }

        #ui h1 { font-size: 3.5rem; font-weight: 100; letter-spacing: 20px; margin: 0; text-transform: uppercase; }
        #ui p { font-size: 0.9rem; letter-spacing: 8px; opacity: 0.4; margin-top: 20px; }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #clock {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 11px;
            z-index: 10;
            transition: opacity 0.5s ease;
            background: rgba(0,0,0,0.4);
            padding: 12px 16px;
            border-radius: 8px;
            min-width: 180px;
        }
        #control-panel label { display: block; margin-top: 8px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        #control-panel input[type="range"] { width: 100%; margin: 0; }
        #control-panel select { width: 100%; margin-top: 4px; padding: 4px; background: #111; color: #fff; border: 1px solid #333; border-radius: 4px; }
        #control-panel .audio-row { margin-top: 10px; }
        #control-panel button { margin-top: 6px; padding: 6px 10px; background: #222; color: #0ff; border: 1px solid #0ff; border-radius: 4px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        #control-panel button:hover { background: #0ff; color: #000; }
        #control-panel button.active { background: #0ff; color: #000; }
        #control-panel input[type="file"] { font-size: 10px; margin-top: 4px; }

        canvas { display: block; filter: saturate(1.2) brightness(1.1); }
    </style>
</head>
<body>
    <div id="controls">
        Scroll / Arrows = Zoom • Mouse = Warp / Gravity • F = Fullscreen • C = Clock • A = Audio Bands • H = Hide HUD • R = Record
    </div>

    <div id="clock" style="display: none;"></div>

    <div id="control-panel">
        <strong>Preset</strong>
        <select id="preset">
            <option value="calm">Calm</option>
            <option value="intense">Intense</option>
            <option value="slow">Slow morph</option>
        </select>
        <label>Morph speed</label>
        <input type="range" id="morphSpeed" min="0.3" max="2" step="0.1" value="1">
        <label>Color speed</label>
        <input type="range" id="colorSpeed" min="0.3" max="2" step="0.1" value="1">
        <label>Camera / zoom</label>
        <input type="range" id="cameraSpeed" min="0.3" max="2" step="0.1" value="1">
        <label>Flow / gravity</label>
        <input type="range" id="fieldStrength" min="0" max="1.5" step="0.05" value="0.6">
        <div class="audio-row">
            <strong>Audio</strong>
            <br><button type="button" id="btnMic">Mic</button>
            <button type="button" id="btnFile">File</button>
            <br><input type="file" id="audioFile" accept="audio/*" style="display:none">
        </div>
        <div class="audio-row">
            <strong>Recording</strong>
            <br><button type="button" id="btnRecord">Start</button>
            <button type="button" id="btnStopRecord" disabled>Stop</button>
            <div id="recordStatus" style="margin-top:4px; font-size:10px; opacity:0.7;">Idle</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const STORAGE_CLOCK = 'nebula-x-clock-visible';
        const STORAGE_HUD = 'nebula-x-hud-visible';

        let scene, camera, renderer, points, geometry;
        let positions, cloudPos, ringPos, spherePos, colors, sizes, phases;
        const particleCount = 100000;

        let time = 0;
        let visualTime = 0;
        // HUD = overlays (bottom instructions + control panel). Center title removed entirely.
        let hudVisible = true;
        let clockVisible = false;
        let mouse = { x: 0, y: 0 };
        let targetMouse = { x: 0, y: 0 };

        let zoomDistance = 1000;
        let targetZoom = 1000;
        const minZoom = 100;
        const maxZoom = 2500;

        let params = {
            morphSpeed: 1,
            colorSpeed: 1,
            cameraSpeed: 1,
            flowStrength: 0.6,
            gravityStrength: 0.6
        };

        const gravityBaseStrength = 0.0005;

        let audioCtx = null;
        let analyser = null;
        let audioEnabled = false;
        let audioLevel = 0;
        let audioSmoothing = 0.15;
        let audioSource = null;
        let audioElement = null;

        let audioMixDestination = null;
        let recorder = null;
        let recordingStream = null;
        let recordedChunks = [];
        let bassLevel = 0;
        let midLevel = 0;
        let highLevel = 0;
        let bassImpulse = 0;

        const PI = Math.PI;
        const PHI = 1.618033988749895;

        const PRESETS = {
            calm:   { morphSpeed: 0.5, colorSpeed: 0.5, cameraSpeed: 0.5 },
            intense: { morphSpeed: 1.5, colorSpeed: 1.5, cameraSpeed: 1.2 },
            slow:   { morphSpeed: 0.35, colorSpeed: 0.35, cameraSpeed: 0.4 }
        };

        const timelinePhases = [
            { duration: 600, density: 0.4, saturation: 0.5, zoomFactor: 0.8 },
            { duration: 600, density: 0.7, saturation: 0.7, zoomFactor: 1.0 },
            { duration: 900, density: 1.0, saturation: 0.9, zoomFactor: 1.2 }
        ];

        function getTimelineState(dt) {
            visualTime += dt;
            let t = visualTime;
            let current = timelinePhases[0];
            for (let i = 0; i < timelinePhases.length; i++) {
                const ph = timelinePhases[i];
                if (t <= ph.duration) {
                    current = ph;
                    break;
                }
                t -= ph.duration;
                if (i === timelinePhases.length - 1) current = ph;
            }
            let acc = 0;
            for (let i = 0; i < timelinePhases.length; i++) acc += timelinePhases[i].duration;
            const cycleT = visualTime % acc;
            let macroZoom = 1;
            let zt = cycleT / acc;
            if (zt < 0.5) macroZoom = 0.8 + 0.6 * (zt / 0.5);
            else macroZoom = 1.4 - 0.4 * ((zt - 0.5) / 0.5);
            return { phase: current, macroZoom };
        }

        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            hudVisible = localStorage.getItem(STORAGE_HUD) !== 'false';
            clockVisible = localStorage.getItem(STORAGE_CLOCK) === 'true';

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0006);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 6000);
            camera.position.z = zoomDistance;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            positions = new Float32Array(particleCount * 3);
            cloudPos = new Float32Array(particleCount * 3);
            ringPos = new Float32Array(particleCount * 3);
            spherePos = new Float32Array(particleCount * 3);
            colors = new Float32Array(particleCount * 3);
            sizes = new Float32Array(particleCount);
            phases = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                cloudPos[i3] = (Math.random() - 0.5) * 2000;
                cloudPos[i3 + 1] = (Math.random() - 0.5) * 2000;
                cloudPos[i3 + 2] = (Math.random() - 0.5) * 2000;

                const angle = Math.random() * Math.PI * 2;
                const radius = 600 + (Math.random() - 0.5) * 200;
                ringPos[i3] = Math.cos(angle) * radius;
                ringPos[i3 + 1] = (Math.random() - 0.5) * 100;
                ringPos[i3 + 2] = Math.sin(angle) * radius;

                const u = Math.random();
                const v = Math.random();
                const thetaS = 2 * Math.PI * u;
                const phiS = Math.acos(2 * v - 1);
                const rS = 400 * Math.pow(Math.random(), 1/3);
                spherePos[i3] = rS * Math.sin(phiS) * Math.cos(thetaS);
                spherePos[i3 + 1] = rS * Math.sin(phiS) * Math.sin(thetaS);
                spherePos[i3 + 2] = rS * Math.cos(phiS);

                positions[i3] = cloudPos[i3];
                positions[i3+1] = cloudPos[i3+1];
                positions[i3+2] = cloudPos[i3+2];

                // Default all particles to white so they are clearly visible
                colors[i3] = 1;
                colors[i3 + 1] = 1;
                colors[i3 + 2] = 1;

                sizes[i] = 1.0 + Math.random() * 3.5;
                phases[i] = Math.random() * Math.PI * 2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 4.5,
                map: createStarTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            window.addEventListener('mousemove', (e) => {
                targetMouse.x = (e.clientX / window.innerWidth - 0.5) * 300;
                targetMouse.y = (e.clientY / window.innerHeight - 0.5) * 300;
            });

            window.addEventListener('wheel', (e) => {
                targetZoom += e.deltaY * 0.5;
                targetZoom = Math.max(minZoom, Math.min(maxZoom, targetZoom));
            }, { passive: true });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp') targetZoom -= 100;
                else if (e.key === 'ArrowDown') targetZoom += 100;
                targetZoom = Math.max(minZoom, Math.min(maxZoom, targetZoom));
                if (e.key === 'f' || e.key === 'F') toggleFullscreen();
                if (e.key === 'c' || e.key === 'C') toggleClock();
                if (e.key === 'a' || e.key === 'A') toggleAudio();
                if (e.key === 'h' || e.key === 'H') toggleHUD();
                if (e.key === 'r' || e.key === 'R') {
                    if (recorder && recorder.state === 'recording') stopRecording();
                    else startRecording();
                }
            });

            // Click no longer toggles HUD (prevents any accidental on-screen text during takes)
            window.addEventListener('resize', onWindowResize);

            document.getElementById('controls').style.opacity = hudVisible ? '1' : '0';
            document.getElementById('control-panel').style.opacity = hudVisible ? '1' : '0';
            document.getElementById('clock').style.display = clockVisible ? 'block' : 'none';

            document.getElementById('preset').addEventListener('change', applyPreset);
            document.getElementById('morphSpeed').addEventListener('input', (e) => { params.morphSpeed = +e.target.value; });
            document.getElementById('colorSpeed').addEventListener('input', (e) => { params.colorSpeed = +e.target.value; });
            document.getElementById('cameraSpeed').addEventListener('input', (e) => { params.cameraSpeed = +e.target.value; });
            document.getElementById('fieldStrength').addEventListener('input', (e) => {
                const v = +e.target.value;
                params.flowStrength = v;
                params.gravityStrength = v;
            });
            document.getElementById('btnMic').addEventListener('click', enableMic);
            document.getElementById('btnFile').addEventListener('click', () => document.getElementById('audioFile').click());
            document.getElementById('audioFile').addEventListener('change', enableFile);
            document.getElementById('btnRecord').addEventListener('click', startRecording);
            document.getElementById('btnStopRecord').addEventListener('click', stopRecording);

            animate();
            if (clockVisible) updateClock();
        }

        function toggleHUD() {
            hudVisible = !hudVisible;
            localStorage.setItem(STORAGE_HUD, String(hudVisible));
            document.getElementById('controls').style.opacity = hudVisible ? '1' : '0';
            document.getElementById('control-panel').style.opacity = hudVisible ? '1' : '0';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
            else document.exitFullscreen();
        }

        function toggleClock() {
            clockVisible = !clockVisible;
            localStorage.setItem(STORAGE_CLOCK, String(clockVisible));
            const el = document.getElementById('clock');
            el.style.display = clockVisible ? 'block' : 'none';
            if (clockVisible) updateClock();
        }

        function updateClock() {
            const el = document.getElementById('clock');
            if (!el || el.style.display === 'none') return;
            el.textContent = new Date().toISOString().substr(11, 12);
            setTimeout(updateClock, 100);
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('btnMic').classList.toggle('active', audioEnabled);
            if (!audioEnabled && audioCtx && audioSource) { try { audioSource.disconnect(); } catch (_) {} }
            audioLevel = 0;
        }

        function ensureAudioGraph() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (!analyser) {
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                analyser.smoothingTimeConstant = 0.7;
            }
            if (!audioMixDestination) {
                audioMixDestination = audioCtx.createMediaStreamDestination();
                // keep it audible too
                analyser.connect(audioCtx.destination);
                analyser.connect(audioMixDestination);
            }
        }

        function enableMic() {
            if (audioEnabled && analyser) { toggleAudio(); return; }
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                ensureAudioGraph();
                if (audioSource) try { audioSource.disconnect(); } catch (_) {}
                audioSource = audioCtx.createMediaStreamSource(stream);
                audioSource.connect(analyser);
                audioEnabled = true;
                document.getElementById('btnMic').classList.add('active');
            }).catch(() => {});
        }

        function enableFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            if (audioElement) {
                try { audioElement.pause(); } catch (_) {}
                audioElement = null;
            }
            audioElement = new Audio(url);
            audioElement.crossOrigin = 'anonymous';

            ensureAudioGraph();
            if (audioSource) try { audioSource.disconnect(); } catch (_) {}
            audioSource = audioCtx.createMediaElementSource(audioElement);
            audioSource.connect(analyser);
            audioEnabled = true;
            document.getElementById('btnMic').classList.add('active');
            audioElement.play().catch(() => {});
        }

        function computeAudioBands() {
            if (!audioEnabled || !analyser) {
                bassLevel *= 0.9;
                midLevel *= 0.9;
                highLevel *= 0.9;
                audioLevel *= 0.9;
                return;
            }
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);

            const nyquist = (audioCtx && audioCtx.sampleRate ? audioCtx.sampleRate : 44100) / 2;
            const binHz = nyquist / data.length;

            let bassSum = 0, bassCount = 0;
            let midSum = 0, midCount = 0;
            let highSum = 0, highCount = 0;

            for (let i = 0; i < data.length; i++) {
                const freq = i * binHz;
                const v = data[i] / 255;
                if (freq < 20) continue;
                if (freq < 250) {
                    bassSum += v; bassCount++;
                } else if (freq < 4000) {
                    midSum += v; midCount++;
                } else if (freq < 20000) {
                    highSum += v; highCount++;
                }
            }

            const bassInstant = bassCount ? bassSum / bassCount : 0;
            const midInstant = midCount ? midSum / midCount : 0;
            const highInstant = highCount ? highSum / highCount : 0;

            const smooth = audioSmoothing;
            bassLevel += (bassInstant - bassLevel) * smooth;
            midLevel += (midInstant - midLevel) * smooth;
            highLevel += (highInstant - highLevel) * smooth;

            const mix = 0.6 * bassLevel + 0.3 * midLevel + 0.1 * highLevel;
            audioLevel += (mix - audioLevel) * smooth;

            const bassThreshold = 0.25;
            if (bassLevel > bassThreshold) {
                // Softer, clamped bass impulse so particles don't blow out of view
                bassImpulse += 1.5 * (bassLevel - bassThreshold);
                if (bassImpulse > 1.0) bassImpulse = 1.0;
            }
        }

        function applyPreset() {
            const name = document.getElementById('preset').value;
            const p = PRESETS[name];
            if (!p) return;
            params.morphSpeed = p.morphSpeed;
            params.colorSpeed = p.colorSpeed;
            params.cameraSpeed = p.cameraSpeed;
            document.getElementById('morphSpeed').value = p.morphSpeed;
            document.getElementById('colorSpeed').value = p.colorSpeed;
            document.getElementById('cameraSpeed').value = p.cameraSpeed;
            document.getElementById('fieldStrength').value = params.flowStrength;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function setRecordStatus(text) {
            const el = document.getElementById('recordStatus');
            if (el) el.textContent = text;
        }

        function startRecording() {
            if (!renderer) return;
            if (recorder && recorder.state === 'recording') return;

            const canvas = renderer.domElement;
            const fps = 60;
            const canvasStream = canvas.captureStream ? canvas.captureStream(fps) : null;
            if (!canvasStream) {
                setRecordStatus('Recording not supported in this browser.');
                return;
            }

            const tracks = [...canvasStream.getVideoTracks()];
            if (audioMixDestination && audioMixDestination.stream) {
                const aTracks = audioMixDestination.stream.getAudioTracks();
                if (aTracks.length) tracks.push(aTracks[0]);
            }

            recordingStream = new MediaStream(tracks);
            recordedChunks = [];

            // Prefer widely supported codecs
            const mimeCandidates = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm'
            ];
            let mimeType = '';
            for (const m of mimeCandidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mimeType = m; break; }
            }

            try {
                recorder = new MediaRecorder(recordingStream, mimeType ? { mimeType } : undefined);
            } catch (e) {
                setRecordStatus('Recorder init failed.');
                return;
            }

            recorder.ondataavailable = (evt) => {
                if (evt.data && evt.data.size > 0) recordedChunks.push(evt.data);
            };
            recorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: recorder.mimeType || 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `nebula-x-recording-${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 10_000);
                setRecordStatus('Saved .webm download.');
            };

            recorder.start(1000); // 1s chunks keeps memory stable for long takes
            document.getElementById('btnRecord').disabled = true;
            document.getElementById('btnStopRecord').disabled = false;
            setRecordStatus('Recording… (R to stop)');

            // Hide HUD automatically while recording so it never appears in the capture
            if (hudVisible) toggleHUD();
        }

        function stopRecording() {
            if (!recorder || recorder.state !== 'recording') return;
            recorder.stop();
            document.getElementById('btnRecord').disabled = false;
            document.getElementById('btnStopRecord').disabled = true;
            setRecordStatus('Finalizing…');
        }

        function animate() {
            requestAnimationFrame(animate);

            computeAudioBands();

            const dt = 0.005 * params.morphSpeed * (1 + audioLevel * 0.3);
            time += dt;
            const timeline = getTimelineState(dt);

            // Stronger decay so any bass push settles quickly
            bassImpulse *= 0.85;

            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;
            const zoomTargetWithTimeline = targetZoom * timeline.phase.zoomFactor * timeline.macroZoom;
            zoomDistance += (zoomTargetWithTimeline - zoomDistance) * 0.05;

            const posAttr = geometry.attributes.position;
            const sizeAttr = geometry.attributes.size;
            const colAttr = geometry.attributes.color;
            const colorTool = new THREE.Color();

            const camSpeed = time * 0.1 * params.cameraSpeed * (1 + audioLevel * 0.2);
            camera.position.x = Math.sin(camSpeed) * (zoomDistance * 0.5) + mouse.x;
            camera.position.y = Math.cos(camSpeed * PI) * (zoomDistance * 0.3) - mouse.y;
            camera.position.z = zoomDistance;
            camera.lookAt(0, 0, 0);

            // Morph driven by time, nudged by mid band
            const baseMorph1 = (Math.sin(time * 0.3 * PHI) + 1) / 2;
            const baseMorph2 = (Math.cos(time * 0.2 * PI) + 1) / 2;
            const midInfluence = 0.6 * midLevel;
            const morphFactor1 = baseMorph1 * (1 - midInfluence) + midInfluence * midLevel;
            const morphFactor2 = baseMorph2 * (1 - midInfluence) + midInfluence * midLevel;

            const baseHue = (time * 0.05 * params.colorSpeed + audioLevel * 0.1) % 1;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                const targetX = THREE.MathUtils.lerp(cloudPos[i3], ringPos[i3], morphFactor1);
                const targetY = THREE.MathUtils.lerp(cloudPos[i3+1], ringPos[i3+1], morphFactor1);
                const targetZ = THREE.MathUtils.lerp(cloudPos[i3+2], ringPos[i3+2], morphFactor1);

                const finalX = THREE.MathUtils.lerp(targetX, spherePos[i3], morphFactor2);
                const finalY = THREE.MathUtils.lerp(targetY, spherePos[i3+1], morphFactor2);
                const finalZ = THREE.MathUtils.lerp(targetZ, spherePos[i3+2], morphFactor2);

                // Base position before fields
                let fx = finalX;
                let fy = finalY;
                let fz = finalZ;

                // Gravity well around cursor (project cursor into scene plane z=0)
                const cursorX = mouse.x;
                const cursorY = -mouse.y;
                const dx = cursorX - fx;
                const dy = cursorY - fy;
                const dz = 0 - fz;
                const r2 = dx * dx + dy * dy + dz * dz + 50;
                const gStrength = gravityBaseStrength * params.gravityStrength * (1 + bassLevel * 4);
                const gScale = gStrength / r2;
                fx += dx * gScale;
                fy += dy * gScale;
                fz += dz * gScale;

                // Flow field (fake noise-based wind) steered by mouse
                const flowBase = params.flowStrength * (0.5 + midLevel);
                const n = Math.sin(fx * 0.0007 + time * 0.6) * Math.cos(fz * 0.0005 + time * 0.4);
                const flowDirX = Math.cos(time * 0.1) + (mouse.x / 300);
                const flowDirZ = Math.sin(time * 0.13) + (mouse.y / 300);
                fx += flowDirX * n * 15 * flowBase;
                fz += flowDirZ * n * 15 * flowBase;

                // Bass-driven radial impulse (scale & outward push)
                const radialDirX = fx;
                const radialDirY = fy;
                const radialDirZ = fz;
                const radialLen = Math.sqrt(radialDirX * radialDirX + radialDirY * radialDirY + radialDirZ * radialDirZ) + 1e-3;
                // Keep radial scaling subtle so structure stays in frame
                const radialScale = 1 + bassImpulse * 0.25;

                // Much smaller outward push so particles don't scatter off-screen
                const baseX = fx * radialScale + (radialDirX / radialLen) * bassImpulse * 8;
                const baseY = fy * radialScale + (radialDirY / radialLen) * bassImpulse * 8;
                const baseZ = fz * radialScale + (radialDirZ / radialLen) * bassImpulse * 8;

                const highJitter = 1 + highLevel * 3;

                posAttr.array[i3] = baseX + Math.sin(time + phases[i]) * 10 * highJitter;
                posAttr.array[i3+1] = baseY + Math.cos(time + phases[i]) * 10 * highJitter;
                posAttr.array[i3+2] = baseZ + Math.sin(time * 0.5 + phases[i]) * 10 * highJitter;

                const densityMask = 1;
                const lightness = 0.4 + (Math.sin(time + phases[i]) * 0.2) + audioLevel * 0.15 + bassLevel * 0.1;
                const saturation = timeline.phase.saturation + (Math.cos(time * 0.5 + phases[i]) * 0.2);
                colorTool.setHSL(baseHue, saturation, lightness);

                colAttr.array[i3] = colorTool.r;
                colAttr.array[i3+1] = colorTool.g;
                colAttr.array[i3+2] = colorTool.b;

                const twinkle = 0.7
                    + Math.sin(time * 4 + phases[i]) * (0.2 + highLevel * 0.5)
                    + audioLevel * 0.1;
                sizeAttr.array[i] = sizes[i] * Math.max(0.3, twinkle) * densityMask;
            }

            posAttr.needsUpdate = true;
            sizeAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            points.rotation.y += 0.001;

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
